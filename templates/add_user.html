{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<div class="form-container">
    <h2>Add User</h2>
    <form method="POST" action="{{ url_for('main.' + action) }}">
        {{ form.hidden_tag() }}
        <div class="form-group">
            {{ form.email.label }}<br>
            {{ form.email(size=32) }}<br>
            {% for error in form.email.errors %}
                <span class="error">{{ error }}</span>
            {% endfor %}
        </div>
        <div class="form-group">
            {{ form.submit() }}
        </div>
    </form>
</div>
{% endblock %}
